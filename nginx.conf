server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|mp4|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  location = /robots.txt {
    try_files $uri =404;
  }

  location = /sitemap.xml {
    try_files $uri =404;
  }
}

